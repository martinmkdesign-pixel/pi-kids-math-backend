<!DOCTYPE html>
<html lang="de">
<head>

<body>
<h1>Pi Kids Math</h1>
<div id="user-info">Lade...</div>

<script>
const BACKEND = "https://marvelous-wisdom-production-1860.up.railway.app";

Pi.authenticate(["username"], function(auth) {

});
