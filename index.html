<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Kids Math Learning</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<style>
.splash-screen {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: linear-gradient(160deg, #1E1B4B 0%, #4F46E5 60%, #312E81 100%);
display: flex; flex-direction: column; align-items: center; justify-content: center;
z-index: 9999; padding: 32px; text-align: center;
animation: splashFadeOut 0.6s ease forwards;
animation-delay: 7.2s;
}
.splash-name {
color: #fff; font-size: 22px; font-weight: 800; letter-spacing: 1px; margin-bottom: 18px;
opacity: 0.9;
}
.splash-message {
color: #EEF2FF; font-size: 17px; font-weight: 500; line-height: 1.6; max-width: 360px;
}
.splash-test-badge {
margin-top: 18px; background: rgba(255,255,255,0.14); color: #FEF9C3;
font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 99px;
border: 1px solid rgba(255,255,255,0.25);
}
  .splash-bar-wrap {
margin-top: 22px; width: 100%; max-width: 300px; height: 8px;
background: rgba(255,255,255,0.18); border-radius: 99px; overflow: hidden;
}
.splash-bar-fill {
height: 100%; width: 0%;
background: linear-gradient(90deg, #A5B4FC, #FEF9C3);
border-radius: 99px;
animation: splashBarFill 7.2s linear forwards;
}
@keyframes splashBarFill {
from { width: 0%; }
to { width: 100%; }
}
.splash-pi {
font-size: 48px; margin-bottom: 24px; opacity: 0.85;
}
.splash-logo {
width: 112px; height: 112px; border-radius: 28px; margin-bottom: 22px;
box-shadow: 0 10px 30px rgba(0,0,0,0.35); object-fit: cover;
}
.consent-overlay {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(30, 27, 75, 0.55);
display: flex; align-items: center; justify-content: center;
z-index: 9998; padding: 16px;
}
.consent-box {
background: #fff; border-radius: 24px; padding: 24px 20px; max-width: 420px; width: 100%;
box-shadow: 0 8px 32px rgba(0,0,0,0.2); max-height: 88vh; overflow-y: auto;
}
.consent-title { font-size: 20px; font-weight: 800; color: #1E1B4B; text-align: center; margin-bottom: 10px; }
.consent-text { font-size: 14px; color: #475569; line-height: 1.6; margin-bottom: 16px; }
.consent-links { display: flex; gap: 8px; margin-bottom: 16px; }
.consent-link-btn { flex: 1; background: #EEF2FF; color: #4F46E5; border-radius: 12px; padding: 10px; font-size: 13px; font-weight: 700; }
.consent-check-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 18px; }
.consent-check-row input { width: 20px; height: 20px; margin-top: 1px; flex-shrink: 0; }
.consent-check-row label { font-size: 13px; color: #475569; line-height: 1.5; }
.doc-screen { padding: 16px; }
.doc-title { font-size: 18px; font-weight: 800; color: #1E1B4B; margin-bottom: 14px; }
.doc-body { font-size: 13px; color: #475569; line-height: 1.7; white-space: pre-wrap; }

@keyframes splashFadeOut {
0% { opacity: 1; }
80% { opacity: 1; }
100% { opacity: 0; visibility: hidden; pointer-events: none; }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: -apple-system, 'Segoe UI', sans-serif; }
body { background: linear-gradient(160deg, #EEF2FF 0%, #FEF9C3 60%, #F0FDF4 100%); min-height: 100vh; }
#app { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 14px; min-height: 100vh; }
.card { width: 100%; max-width: 460px; background: #fff; border-radius: 24px; padding: 22px 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); display: flex; flex-direction: column; gap: 12px; }
h1 { font-size: 30px; font-weight: 900; color: #1E1B4B; text-align: center; letter-spacing: -1px; }
.sub { text-align: center; color: #64748B; font-size: 15px; }
.pill { background: #EEF2FF; color: #4F46E5; padding: 5px 12px; border-radius: 99px; font-size: 13px; font-weight: 700; display: inline-block; }
.pills { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
button { cursor: pointer; border: none; font-family: inherit; font-size: 16px; }
.btn-pi { background: #6366F1; color: #fff; border-radius: 16px; padding: 14px; font-size: 17px; font-weight: 800; width: 100%; }
.btn-green { background: #10B981; color: #fff; border-radius: 16px; padding: 14px; font-size: 17px; font-weight: 800; width: 100%; }
.btn-back { background: none; color: #6366F1; font-size: 14px; font-weight: 700; padding: 6px 10px; min-width: 80px; min-height: 40px; }
.btn-purple{ background: #7C3AED; color: #fff; border-radius: 16px; padding: 14px; font-size: 17px; font-weight: 800; width: 100%; }
.bar-wrap { width: 100%; background: #E2E8F0; border-radius: 99px; height: 9px; overflow: hidden; }
.bar-fill { height: 100%; background: linear-gradient(90deg,#6366F1,#8B5CF6); border-radius: 99px; transition: width 0.4s; }
.map-header { width: 100%; max-width: 460px; background: #fff; border-radius: 16px; padding: 12px 18px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); display: flex; justify-content: space-between; align-items: center; }
.stufe-block { width: 100%; max-width: 460px; background: #fff; border-radius: 20px; padding: 16px 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); }
.stufe-head { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 12px; }
.stufe-tag { background: #6366F1; color: #fff; padding: 4px 12px; border-radius: 99px; font-weight: 800; font-size: 13px; }
.stufe-tag2 { background: #7C3AED; }
.stufe-sub { font-size: 13px; color: #64748B; font-weight: 600; flex: 1; }
.free-tag { background: #D1FAE5; color: #065F46; padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; }
.unlock-btn { background: #7C3AED; color: #fff; border-radius: 12px; padding: 8px 14px; font-size: 13px; font-weight: 700; }
.level-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.lvl-btn { width: 56px; height: 56px; border-radius: 14px; background: #F8FAFC; border: 2px solid #E2E8F0; color: #374151; font-weight: 800; font-size: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; position: relative; padding: 0; }
.lvl-done { background: #D1FAE5 !important; border-color: #10B981 !important; }
.lvl-locked { background: #F1F5F9 !important; color: #CBD5E1 !important; }
.lock-icon { position: absolute; top: -7px; right: -7px; font-size: 13px; }
.q-label { font-size: 20px; font-weight: 800; color: #1E1B4B; text-align: center; }
.g-box { background: #F8FAFC; border-radius: 16px; padding: 16px 12px 10px; border: 2px dashed #CBD5E1; position: relative; }
.g-label { position: absolute; top: -11px; left: 12px; background: #6366F1; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 99px; }
.emoji-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; min-height: 64px; align-items: center; }
.emoji-item { font-size: clamp(22px,5vw,32px); display: inline-block; }
.op-sign { text-align: center; font-size: 30px; font-weight: 900; color: #6366F1; }
.big-calc { text-align: center; font-size: 42px; font-weight: 900; color: #7C3AED; padding: 12px 0; }
.ans-row { display: flex; gap: 12px; justify-content: center; margin-top: 4px; }
.ans-btn { width: 78px; height: 78px; border-radius: 20px; font-size: 28px; font-weight: 900; color: #1E1B4B; background: #fff; border: 3px solid #E2E8F0; box-shadow: 0 2px 8px rgba(0,0,0,0.08); transition: transform 0.15s; padding: 0; }
.ans-correct { background: #D1FAE5 !important; border-color: #10B981 !important; transform: scale(1.08); }
.ans-wrong { background: #FEE2E2 !important; border-color: #EF4444 !important; }
.ans-reveal { background: #D1FAE5 !important; border-color: #10B981 !important; }
.feedback { text-align: center; font-weight: 700; font-size: 16px; padding: 10px 14px; border-radius: 12px; }
.fb-ok { background: #D1FAE5; color: #065F46; }
.fb-no { background: #FEE2E2; color: #991B1B; }
.fb-empty { opacity: 0; background: #F8FAFC; }
.lvl-badge { background: #EEF2FF; color: #4F46E5; padding: 4px 12px; border-radius: 99px; font-size: 13px; font-weight: 800; }
.game-top { display: flex; justify-content: space-between; align-items: center; }
.pay-option { border: 2px solid #E2E8F0; border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.pay-best { border-color: #7C3AED !important; background: #F5F3FF !important; }
.pay-small-btn { background: #6366F1; color: #fff; border-radius: 12px; padding: 10px 16px; font-size: 15px; font-weight: 800; white-space: nowrap; }
.user-badge { display: flex; align-items: center; gap: 8px; justify-content: center; background: #EEF2FF; border-radius: 12px; padding: 10px 16px; font-size: 15px; font-weight: 700; color: #4F46E5; }
.prog-text { font-size: 13px; color: #94A3B8; text-align: right; margin-top: 4px; }
.stars-row { display: flex; justify-content: center; gap: 4px; }
@keyframes bounce {
0% { transform: translateY(0) scale(1); }
35% { transform: translateY(-14px) scale(1.2); }
65% { transform: translateY(-5px) scale(1.06); }
100% { transform: translateY(0) scale(1); }
}
.do-bounce { animation: bounce 0.5s ease both; }
</style>
</head>

const EMOJI_SETS = [
["🍎","🍓","🍊","🍋","🍇","🍒","🥝"],
["🐸","🐥","🐠","🦋","🐣","🐢","🦊"],

const LEVELS = Array.from({length:100},(_,i)=>{
const n=i+1, es=EMOJI_SETS[Math.floor(i/10)%3];

// Level 1-20: Plus/Minus, Zahlen 1-10
const mx=Math.min(3+Math.floor(n/2),10);

}
if(n<=50){
// Level 21-50: Plus/Minus, Zahlen schrittweise steigend von ~10 bis ~999
const progress=(n-20)/(50-20);
const mx=Math.round(10+progress*(999-10));
return{id:n,stufe:1,mx,ops:["+","-"],free:true,es};
}
// Level 51-100: Mal/Geteilt, Stufe 2
const mx=Math.min(2+Math.floor((n-50)/2),10);

});

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function makeQ(cfg){
const op=cfg.ops[Math.floor(Math.random()*cfg.ops.length)];
const emoji=cfg.es[Math.floor(Math.random()*cfg.es.length)];
let a,b,ans;
if(op==="+"){a=rand(1,cfg.mx-1);b=rand(1,cfg.mx-a);ans=a+b;}
else if(op==="-"){a=rand(2,cfg.mx);b=rand(1,a-1);ans=a-b;}
else if(op==="×"){a=rand(1,cfg.mx);b=rand(1,5);ans=a*b;}
else{b=rand(1,5);ans=rand(1,cfg.mx);a=ans*b;}
const spread = cfg.mx>20 ? Math.max(2,Math.round(cfg.mx*0.05)) : 1;
let w1=ans+(Math.random()>.5?spread:-spread); if(w1<0)w1=ans+spread*2; if(w1===ans)w1+=spread;
let w2=w1+(Math.random()>.5?spread:spread*2); if(w2===ans||w2===w1)w2=w1+spread*2;
return{a,b,op,ans,emoji,choices:[ans,w1,w2].sort(()=>Math.random()-.5)};
}

let piUser=null;

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(()=>reject(new Error('Zeitüberschreitung nach '+ms+'ms')), ms))
  ]);
}

function piInit(){
  if(!window.Pi) return Promise.resolve(false);
  try{
    if(!piInitialized) piInitialized = Pi.init({ version: "2.0", sandbox: SANDBOX });
    return Promise.resolve(piInitialized);
  }catch(e){
    console.error('Pi.init fehlgeschlagen (vermutlich kein echter Pi Browser):', e);
    return Promise.resolve(false);
  }
}

async function piLogin(){
  if(!window.Pi){ piUser={username:"test_nutzer"}; return piUser; }
  await piInit(); // Pi.init vollständig abwarten, bevor authenticate läuft
  return new Promise((res,rej)=>{
    window.Pi.authenticate(["username","payments"], async inc=>{
      try{
        const txid = inc.transaction ? inc.transaction.txid : null;
        if(txid){
          await fetch(BACKEND_URL+'/payments/complete', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({paymentId: inc.identifier, txid})
          });
        }
      }catch(e){
        console.error('Fehler beim Abschließen einer offenen Zahlung:', e);
      }
    }).then(async a=>{
      try{
        const verifyRes = await fetch(BACKEND_URL+'/auth/verify', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({ accessToken: a.accessToken })
        });
        const verifyData = await verifyRes.json();
        if(verifyData.success){
          piUser = a.user;
          res(piUser);
        } else {
          console.error('Token-Validierung fehlgeschlagen:', verifyData);
          rej(new Error('Token ungültig'));
        }
      }catch(e){
        console.error('Fehler bei Backend-Validierung:', e);
        rej(e);
      }
    }).catch(rej);
  });
}

if(!window.Pi){setTimeout(()=>onOk({txid:"test_"+Date.now(),priceType:amount>=14?"all_levels":"single_level"}),1200);return;}
try{
window.Pi.createPayment({amount,memo,metadata:{app:"PiKidsMath"}},{
onReadyForServerApproval: async (paymentId) => {
try {
await fetch(BACKEND_URL+'/payments/approve', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({paymentId})
});
} catch(e){ console.error('Approve error:', e); if(onFail)onFail("Verbindung zum Server hat nicht geklappt."); }
},
onReadyForServerCompletion: async (paymentId, txid) => {
try {
const res = await fetch(BACKEND_URL+'/payments/complete', {
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({paymentId, txid})
});
const data = await res.json();
if(data.success && data.unlocked) onOk({txid, priceType:data.priceType});
else { console.error('Complete fehlgeschlagen:', data); if(onFail)onFail("Die Zahlung konnte nicht abgeschlossen werden."); }
} catch(e){ console.error('Complete error:', e); if(onFail)onFail("Verbindung zum Server hat nicht geklappt."); }
},
onCancel: (pid) => { console.log('Zahlung abgebrochen:', pid); if(onFail)onFail(null); },
onError: (err) => { console.error('Pi createPayment Fehler:', err); if(onFail)onFail("Die Zahlung hat nicht funktioniert. Bitte versuch's später noch einmal."); }
});
} catch(syncErr){
console.error('Synchroner Fehler bei createPayment:', syncErr);
if(onFail)onFail("Die Zahlung konnte nicht gestartet werden. Bitte versuch's später noch einmal.");
}
}
// ── STATE ─────────────────────────────────────────────────────────────────────
let screen="home",curLevel=null,curQ=null,qNum=0,hits=0,sel=null,fb=null,bouncing=false;
let answerLocked=false;
let payError=null;

// ── HELPER ────────────────────────────────────────────────────────────────────
const app=document.getElementById("app");

function mkEl(tag,opts){
const e=document.createElement(tag);
if(opts.cls) e.className=opts.cls;
if(opts.text) e.textContent=opts.text;
if(opts.html) e.innerHTML=opts.html;
if(opts.style)Object.assign(e.style,opts.style);
if(opts.click)e.addEventListener("click",opts.click);
if(opts.disabled)e.disabled=true;
return e;
}

function mkBtn(text,cls,onClick){
return mkEl("button",{text,cls,click:onClick});
}

function mkBar(val,max){
const w=mkEl("div",{cls:"bar-wrap"});
const f=mkEl("div",{cls:"bar-fill"});
f.style.width=Math.round((val/max)*100)+"%";
w.appendChild(f); return w;
}

function render(){
app.innerHTML="";
({home:renderHome,map:renderMap,game:renderGame,done:renderDone,pay:renderPay,yay:renderYay,consent:renderConsent,terms:renderTerms,privacy:renderPrivacy}[screen]||renderHome)();
}

box.appendChild(mkEl("div",{text:"📋",style:{fontSize:"44px",textAlign:"center",marginBottom:"8px"}}));

box.appendChild(mkEl("div",{cls:"consent-text",text:"Kids Math Learning ist ein Lernspiel für Kinder. Einige Level können optional mit Pi (aktuell Test-Pi, kein echtes Geld) freigeschaltet werden. Diese Bestätigung muss von einem Erwachsenen / Erziehungsberechtigten vorgenommen werden - nicht vom Kind selbst. Die App befindet sich aktuell in einer aktiven Testphase. Trotz sorgfältiger Entwicklung kann ein fehlerfreier Betrieb nicht garantiert werden - gelegentliche Bugs sind in diesem Stadium möglich. Über Hinweise dazu freue ich mich sehr (Kontakt siehe Nutzungsbedingungen)."}));

function renderTerms(){ renderDocScreen("📜 Nutzungsbedingungen", TERMS_TEXT); }
function renderPrivacy(){ renderDocScreen("🔒 Datenschutzerklärung", PRIVACY_TEXT); }

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(){
const card=mkEl("div",{cls:"card"});

card.appendChild(mkEl("div",{html:"🧮",style:{fontSize:"66px",textAlign:"center"}}));
card.appendChild(mkEl("h1",{text:"Kids Math Learning"}));
card.appendChild(mkEl("p",{cls:"sub",text:"Mathe für Kinder — spielend leicht!"}));

const pills=mkEl("div",{cls:"pills"});
["🆓 50 Level kostenlos","➕➖ Plus & Minus","✖️➗ Mal & Geteilt"].forEach(t=>{
pills.appendChild(mkEl("span",{cls:"pill",text:t}));
});
card.appendChild(pills);

if(piUser){

ub.appendChild(mkEl("span",{text:"π"}));
ub.appendChild(mkEl("span",{text:piUser.username}));

piUser=null;
render();
}));
} else {
let busy=false;
const lb=mkEl("button",{cls:"btn-pi",text:"π Mit Pi einloggen",click:async()=>{
if(busy)return; busy=true; lb.textContent="Verbinde...";
try{ await withTimeout(piLogin(), 8000); }catch(e){ console.error('Login fehlgeschlagen:', e); }
busy=false; render();
}});

}

card.appendChild(mkBtn("▶ Spielen","btn-green",()=>{screen="map";render();}));

// ── MAP ───────────────────────────────────────────────────────────────────────
function renderMap(){
const done=prog.completedLevels||[];
const unlock=prog.unlockedStufe2||false;

// Header
const hdr=mkEl("div",{cls:"map-header"});
hdr.appendChild(mkBtn("← Home","btn-back",()=>{screen="home";render();}));
hdr.appendChild(mkEl("span",{html:"<b style='color:#4F46E5;font-size:17px'>π Kids Math Learning</b>"}));
hdr.appendChild(mkEl("span",{text:"⭐ "+Math.min(5,Math.floor(done.length/4))+"/5",style:{fontSize:"13px",fontWeight:"700",color:"#6366F1"}}));
app.appendChild(hdr);

// Stufe 1
const s1=LEVELS.filter(l=>l.stufe===1);
const doneS1=s1.filter(l=>done.includes(l.id)).length;
const b1=mkEl("div",{cls:"stufe-block"});
const h1=mkEl("div",{cls:"stufe-head"});
h1.appendChild(mkEl("span",{cls:"stufe-tag",text:"Stufe 1"}));
h1.appendChild(mkEl("span",{cls:"stufe-sub",text:"➕ ➖ Plus & Minus · 1–999"}));
h1.appendChild(mkEl("span",{cls:"free-tag",text:"🆓 Kostenlos"}));
b1.appendChild(h1);
const g1=mkEl("div",{cls:"level-grid"});
s1.forEach(l=>{
const isDone=done.includes(l.id);
const lb=mkEl("button",{cls:"lvl-btn"+(isDone?" lvl-done":""),click:()=>startLevel(l)});
if(isDone)lb.appendChild(mkEl("span",{text:"✅",style:{fontSize:"11px"}}));
lb.appendChild(mkEl("span",{text:String(l.id)}));
g1.appendChild(lb);
});
b1.appendChild(g1);
b1.appendChild(mkBar(doneS1,s1.length));
b1.appendChild(mkEl("p",{cls:"prog-text",text:doneS1+" / "+s1.length+" abgeschlossen"}));
app.appendChild(b1);

// Stufe 2
const s2=LEVELS.filter(l=>l.stufe===2);
const doneS2=s2.filter(l=>done.includes(l.id)).length;
const b2=mkEl("div",{cls:"stufe-block"});
const h2=mkEl("div",{cls:"stufe-head"});
h2.appendChild(mkEl("span",{cls:"stufe-tag stufe-tag2",text:"Stufe 2"}));
h2.appendChild(mkEl("span",{cls:"stufe-sub",text:"✖️ ➗ Mal & Geteilt"}));
if(!unlock){
h2.appendChild(mkBtn("🔓 Freischalten","unlock-btn",()=>{screen="pay";render();}));
}
b2.appendChild(h2);
const g2=mkEl("div",{cls:"level-grid"});
s2.forEach(l=>{
const isDone=done.includes(l.id);
const singleUnlocked=prog.singleUnlockedLevels||[];
const locked=!l.free && !unlock && !singleUnlocked.includes(l.id);
const lb=mkEl("button",{cls:"lvl-btn"+(isDone?" lvl-done":locked?" lvl-locked":"")});
if(locked){
const lk=mkEl("span",{cls:"lock-icon",text:"🔒"});
lb.appendChild(lk);
} else {
lb.addEventListener("click",()=>startLevel(l));
}
if(isDone)lb.appendChild(mkEl("span",{text:"✅",style:{fontSize:"11px"}}));
lb.appendChild(mkEl("span",{text:String(l.id)}));
g2.appendChild(lb);
});
b2.appendChild(g2);
if(unlock){
b2.appendChild(mkBar(doneS2,s2.length));
b2.appendChild(mkEl("p",{cls:"prog-text",text:doneS2+" / "+s2.length+" abgeschlossen"}));
} else {
b2.appendChild(mkEl("p",{text:"Level 56–100 mit Pi freischalten",style:{fontSize:"13px",color:"#7C3AED",textAlign:"center",fontWeight:"600"}}));
}
app.appendChild(b2);
}

function startLevel(lv){
curLevel=lv; qNum=0; hits=0; sel=null; fb=null; bouncing=false; answerLocked=false;
curQ=makeQ(lv); screen="game"; render();
}

// ── GAME ──────────────────────────────────────────────────────────────────────
function renderGame(){
const card=mkEl("div",{cls:"card"});

const top=mkEl("div",{cls:"game-top"});
const leftGroup=mkEl("div",{style:{display:"flex",gap:"4px"}});
const backBtn=mkBtn("← Karte","btn-back",()=>{
screen="map"; render();
});
const homeBtn=mkBtn("🏠","btn-back",()=>{
screen="home"; render();
});
homeBtn.style.minWidth="40px";
leftGroup.appendChild(backBtn);
leftGroup.appendChild(homeBtn);
top.appendChild(leftGroup);
top.appendChild(mkEl("span",{cls:"lvl-badge",text:"Level "+curLevel.id}));
top.appendChild(mkEl("span",{text:(qNum+1)+"/"+Q_PER_LVL,style:{fontSize:"13px",fontWeight:"700",color:"#6366F1"}}));
card.appendChild(top);
card.appendChild(mkBar(qNum,Q_PER_LVL));

card.appendChild(mkEl("p",{cls:"q-label",text:"Was ist "+curQ.a+" "+curQ.op+" "+curQ.b+"?"}));

const MAX_EMOJI=20;

if(curQ.op==="+"){
if(curQ.a>MAX_EMOJI || curQ.b>MAX_EMOJI){
card.appendChild(mkEl("div",{cls:"big-calc",text:curQ.a+" + "+curQ.b+" = ?"}));
} else {
const g1=mkEl("div",{cls:"g-box"});
g1.appendChild(mkEl("span",{cls:"g-label",text:"Gruppe 1"}));
const eg1=mkEl("div",{cls:"emoji-grid"});
for(let i=0;i<curQ.a;i++){
const s=mkEl("span",{cls:"emoji-item",text:curQ.emoji});
if(bouncing&&fb==="ok"){s.classList.add("do-bounce");s.style.animationDelay=(i*0.06)+"s";}
eg1.appendChild(s);
}
g1.appendChild(eg1);
card.appendChild(g1);
card.appendChild(mkEl("div",{cls:"op-sign",text:"+"}));
const g2=mkEl("div",{cls:"g-box"});
g2.appendChild(mkEl("span",{cls:"g-label",text:"Gruppe 2"}));
const eg2=mkEl("div",{cls:"emoji-grid"});
for(let i=0;i<curQ.b;i++){
const s=mkEl("span",{cls:"emoji-item",text:curQ.emoji});
if(bouncing&&fb==="ok"){s.classList.add("do-bounce");s.style.animationDelay=(i*0.06)+"s";}
eg2.appendChild(s);
}
g2.appendChild(eg2);
card.appendChild(g2);
}
} else if(curQ.op==="-"){
if(curQ.a>MAX_EMOJI){
card.appendChild(mkEl("div",{cls:"big-calc",text:curQ.a+" − "+curQ.b+" = ?"}));
card.appendChild(mkEl("p",{text:curQ.b+" wegnehmen — wie viele bleiben übrig? 🤔",style:{textAlign:"center",fontSize:"15px",color:"#64748B",fontWeight:"600"}}));
} else {
const gbox=mkEl("div",{cls:"g-box"});
gbox.appendChild(mkEl("span",{cls:"g-label",text:curQ.b+" wegnehmen"}));
const egrid=mkEl("div",{cls:"emoji-grid"});
for(let i=0;i<curQ.a;i++){
const s=mkEl("span",{cls:"emoji-item",text:curQ.emoji});
if(i < curQ.ans){
if(bouncing&&fb==="ok"){s.classList.add("do-bounce");s.style.animationDelay=(i*0.06)+"s";}
} else {
s.style.opacity="0.2";
s.style.filter="grayscale(1)";
s.style.textDecoration="line-through";
}
egrid.appendChild(s);
}
gbox.appendChild(egrid);
card.appendChild(gbox);
card.appendChild(mkEl("p",{text:"Wie viele bleiben übrig? 🤔",style:{textAlign:"center",fontSize:"15px",color:"#64748B",fontWeight:"600"}}));
}
} else {
card.appendChild(mkEl("div",{cls:"big-calc",text:curQ.a+" "+curQ.op+" "+curQ.b+" = ?"}));
}

const ar=mkEl("div",{cls:"ans-row"});
curQ.choices.forEach(c=>{
const ab=mkEl("button",{cls:"ans-btn",text:String(c),click:()=>doAnswer(c)});
if(sel!==null){
if(c===sel) ab.classList.add(fb==="ok"?"ans-correct":"ans-wrong");
else if(c===curQ.ans) ab.classList.add("ans-reveal");
}
ar.appendChild(ab);
});
card.appendChild(ar);

const fbox=mkEl("div",{cls:"feedback "+(fb?"fb-"+(fb==="ok"?"ok":"no"):"fb-empty"),
text:fb==="ok"?"🎉 Richtig! Toll gemacht!":fb==="no"?"😅 Fast! Die Antwort war "+curQ.ans:" "});
card.appendChild(fbox);

card.appendChild(mkEl("p",{text:"✅ "+hits+" richtig in diesem Level",style:{textAlign:"center",fontSize:"13px",color:"#94A3B8"}}));
app.appendChild(card);
}

function doAnswer(c){
if(answerLocked)return;
answerLocked=true;
sel=c;
const ok=c===curQ.ans;
fb=ok?"ok":"no";
if(ok){bouncing=true;hits++;}
render();
setTimeout(()=>advance(),ok?1100:1350);
}

function advance(){
const nxt=qNum+1;
if(nxt>=Q_PER_LVL){
const passed=hits>=Math.ceil(Q_PER_LVL*0.6);
if(passed){
const cl=prog.completedLevels||[];
if(!cl.includes(curLevel.id))prog.completedLevels=[...cl,curLevel.id];
saveProg();
}
screen="done"; render(); return;
}
qNum=nxt; sel=null; fb=null; bouncing=false; answerLocked=false;
curQ=makeQ(curLevel); render();
}

// ── DONE ──────────────────────────────────────────────────────────────────────
function renderDone(){
const passed=hits>=Math.ceil(Q_PER_LVL*0.6);
const nextLv=LEVELS.find(l=>l.id===(curLevel.id+1));
const unlock=prog.unlockedStufe2||false;
const card=mkEl("div",{cls:"card"});

card.appendChild(mkEl("div",{text:passed?"🏆":"💪",style:{fontSize:"62px",textAlign:"center"}}));
card.appendChild(mkEl("h1",{text:passed?"Level geschafft!":"Noch mal versuchen!",style:{fontSize:"24px"}}));
card.appendChild(mkEl("p",{cls:"sub",text:hits+" von "+Q_PER_LVL+" richtig"}));

const sr=mkEl("div",{cls:"stars-row"});
for(let i=0;i<Q_PER_LVL;i++){
sr.appendChild(mkEl("span",{text:"⭐",style:{fontSize:"22px",filter:i<hits?"none":"grayscale(1) opacity(0.3)"}}));
}
card.appendChild(sr);
card.appendChild(mkBtn("🔄 Nochmal spielen","btn-green",()=>startLevel(curLevel)));

if(passed&&nextLv){
const canPlay=nextLv.free||unlock;
const nb=mkBtn(
canPlay?"▶ Level "+nextLv.id+" starten":"🔒 Level "+nextLv.id+" freischalten",
"btn-purple",
()=>{if(canPlay)startLevel(nextLv);else{screen="pay";render();}}
);
if(!canPlay)nb.style.background="#94A3B8";
card.appendChild(nb);
}

card.appendChild(mkBtn("← Zur Levelkarte","btn-back",()=>{screen="map";render();}));
app.appendChild(card);
}

// ── PAYMENT ───────────────────────────────────────────────────────────────────
function renderPay(){
const card=mkEl("div",{cls:"card"});
card.appendChild(mkEl("div",{text:"🔓",style:{fontSize:"52px",textAlign:"center"}}));
card.appendChild(mkEl("h1",{text:"Stufe 2 freischalten",style:{fontSize:"22px"}}));
card.appendChild(mkEl("p",{cls:"sub",text:"50 Level mit Mal & Geteilt. Level 51–55 kostenlos · Level 56–100 mit Pi freischalten.",style:{fontSize:"14px",lineHeight:"1.55"}}));

function payOption(label,sub,amount,memo,isPurple){
const o=mkEl("div",{cls:"pay-option"+(isPurple?" pay-best":"")});
const info=mkEl("div",{});
info.appendChild(mkEl("div",{text:label,style:{fontWeight:"800",fontSize:"15px",color:isPurple?"#7C3AED":"inherit"}}));
info.appendChild(mkEl("div",{text:sub,style:{color:isPurple?"#7C3AED":"#64748B",fontSize:"13px"}}));
o.appendChild(info);
let busy=false;
const pb=mkEl("button",{cls:"pay-small-btn",text:amount+" π",click:async()=>{
if(busy)return; busy=true; pb.textContent="⏳..."; payError=null;
if(!piUser){try{await withTimeout(piLogin(), 8000);}catch(e){console.error('Login fehlgeschlagen:', e);}}
await piPay(amount,memo,(result)=>{
if(result.priceType==="all_levels"){
prog.unlockedStufe2=true;
} else if(result.priceType==="single_level"){
const s2=LEVELS.filter(l=>l.stufe===2);
const done=prog.completedLevels||[];
const singleUnlocked=prog.singleUnlockedLevels||[];
const nextLocked=s2.find(l=>!l.free && !singleUnlocked.includes(l.id));
if(nextLocked) prog.singleUnlockedLevels=[...singleUnlocked,nextLocked.id];
}
saveProg();
screen="yay";render();
},(errMsg)=>{
busy=false; pb.textContent=amount+" π";
if(errMsg) payError=errMsg;
render();
});
}});
if(isPurple)pb.style.background="#7C3AED";
o.appendChild(pb);
return o;
}

card.appendChild(payOption("1 Level freischalten","Flexibel · zahle pro Level",0.5,"Kids Math Learning 1 Level",false));
card.appendChild(payOption("⭐ Alle Level freischalten","45 Level · spare ca. 38%",14,"Kids Math Learning Stufe 2 komplett",true));

if(payError) card.appendChild(mkEl("p",{text:"😅 "+payError,style:{textAlign:"center",fontSize:"13px",color:"#991B1B",fontWeight:"700",background:"#FEE2E2",padding:"10px",borderRadius:"12px"}}));
if(!piUser) card.appendChild(mkEl("p",{text:"⚠️ Bitte zuerst mit Pi einloggen",style:{textAlign:"center",fontSize:"13px",color:"#F59E0B",fontWeight:"700"}}));
card.appendChild(mkBtn("← Zurück","btn-back",()=>{payError=null;screen="map";render();}));
app.appendChild(card);
}

// ── CELEBRATE ─────────────────────────────────────────────────────────────────
function renderYay(){
const card=mkEl("div",{cls:"card"});
card.appendChild(mkEl("div",{text:"🎊",style:{fontSize:"68px",textAlign:"center"}}));
card.appendChild(mkEl("h1",{text:"Freigeschaltet!",style:{fontSize:"24px"}}));
card.appendChild(mkEl("p",{cls:"sub",text:"Stufe 2 ist jetzt komplett verfügbar. Viel Spaß!"}));
card.appendChild(mkBtn("▶ Zur Levelkarte","btn-green",()=>{screen="map";render();}));
app.appendChild(card);
}

// ── START ─────────────────────────────────────────────────────────────────────
let hasConsent=false;
try{hasConsent=localStorage.getItem("pkm4_consent")==="true";}catch{}
screen = hasConsent ? "home" : "consent";
render(); // App sofort anzeigen – unabhängig davon, ob/wie lange Pi im Hintergrund braucht

(async function tryPiAutoLogin(){
  try{
    await withTimeout(piInit(), 5000);
    if(window.Pi && hasConsent){
      await withTimeout(piLogin(), 8000);
      render(); // nur erneut rendern, wenn der Login tatsächlich geklappt hat
    }
  }catch(e){
    console.log('Pi-Initialisierung/Auto-Login nicht möglich (z.B. kein echter Pi Browser, oder Zeitüberschreitung):', e);
  }
})();

</script>
